<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人类喝酒行为观察</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a365d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            color: #fff;
        }
        .container {
            max-width: 420px;
            width: 100%;
        }
        .start-page {
            text-align: center;
            padding-top: 40px;
        }
        .main-title {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #60a5fa, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .sub-title {
            font-size: 13px;
            color: #64748b;
            letter-spacing: 3px;
            margin-bottom: 50px;
        }
        .deco {
            font-size: 60px;
            margin-bottom: 40px;
            opacity: 0.8;
        }
        .desc {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 50px;
            padding: 0 20px;
        }
        .start-btn {
            padding: 14px 60px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            border-radius: 30px;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(59, 130, 246, 0.4);
            transition: transform 0.2s;
        }
        .start-btn:active {
            transform: scale(0.96);
        }
        .footer-tip {
            margin-top: 40px;
            font-size: 11px;
            color: #475569;
        }
        .quiz-page {
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #f59e0b);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }
        .question-num {
            font-size: 12px;
            color: #64748b;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            font-size: 12px;
            color: #60a5fa;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .back-btn:hover {
            opacity: 1;
        }
        .back-btn.disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        .question-text {
            font-size: 17px;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 26px;
            color: #e2e8f0;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 12px;
            font-size: 13.5px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.25s;
            line-height: 1.5;
        }
        .option:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(96, 165, 250, 0.5);
            transform: translateX(4px);
        }
        .option.selected {
            background: rgba(59, 130, 246, 0.25);
            border-color: #60a5fa;
        }
        .result-page {
            display: none;
            text-align: center;
            padding-top: 20px;
        }
        .result-label {
            font-size: 12px;
            color: #64748b;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }
        .result-type {
            font-size: 28px;
            font-weight: 500;
            background: linear-gradient(90deg, #60a5fa, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .result-slogan {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 36px;
            letter-spacing: 1px;
        }
        .result-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 36px;
            text-align: left;
        }
        .result-card-title {
            font-size: 13px;
            color: #60a5fa;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .result-desc {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.8;
        }
        .result-emoji {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .restart-btn {
            padding: 12px 40px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(96, 165, 250, 0.4);
            color: #93c5fd;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .restart-btn:hover {
            background: rgba(59, 130, 246, 0.3);
        }
        .share-tip {
            margin-top: 24px;
            font-size: 11px;
            color: #475569;
        }
        .page {
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="start-page page" id="startPage">
            <div class="main-title">人类喝酒行为观察</div>
            <div class="sub-title">HUMAN DRINKING BEHAVIOR</div>
            <div class="deco">🍻</div>
            <div class="desc">
                20道题，深度鉴定你的喝酒人格<br>
                从赴约到断片，全方位扫描<br>
                纯属娱乐，请勿较真
            </div>
            <button class="start-btn" onclick="startQuiz()">开 始 测 试</button>
            <div class="footer-tip">共 20 题 · 12 种人格 · 支持返回修改</div>
        </div>

        <div class="quiz-page page" id="quizPage">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-num">
                <span id="questionNumText">第 1 / 20 题</span>
                <span class="back-btn" id="backBtn" onclick="goBack()">← 上一题</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="options"></div>
        </div>

        <div class="result-page page" id="resultPage">
            <div class="result-label">你 的 喝 酒 人 格 是</div>
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-type" id="resultType"></div>
            <div class="result-slogan" id="resultSlogan"></div>
            <div class="result-card">
                <div class="result-card-title">人格解析</div>
                <div class="result-desc" id="resultDesc"></div>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">再 测 一 次</button>
            <div class="share-tip">截图分享给朋友，看看他们是什么类型</div>
        </div>
    </div>

    <script>
        const personalities = {
            qianbei: { name: '千杯不醉型', emoji: '🍶', slogan: '酒局定海神针，散场兜底人',
                desc: '你是酒局最后的防线，别人都喝趴下了你还能清醒地帮所有人叫代驾。酒量深不见底，越喝越冷静，是朋友们公认的酒局安全感担当，有你在散场永远不慌。' },
            yibeidao: { name: '一杯倒型', emoji: '🥴', slogan: '啤酒一杯上脸，两瓶直接断片',
                desc: '你的酒量属于"参与型"，主打一个气氛到位就行。酒桌上永远是最先脸红、最先趴下的那个，但丝毫不影响你每次都积极参加，重在掺和说的就是你。' },
            yangyu: { name: '养鱼大师型', emoji: '🐟', slogan: '一杯酒喝一晚，杯子里的鱼都快养大了',
                desc: '你是酒局常青树，谁劝都不喝，杯子里永远剩一口。主打一个陪伴，喝多喝少不重要，人到场了就算给面子，劝酒话术在你这里全部失效。' },
            laizhebuqu: { name: '来者不拒型', emoji: '🥂', slogan: '谁敬都喝，从不bb',
                desc: '你是酒局最爽快的人，不养鱼不推脱，端杯就干。性格直来直去，喝酒跟做人一样敞亮，是酒桌上最受欢迎的那种人，但偶尔容易喝超量。' },
            chenmo: { name: '沉默喝手型', emoji: '🍺', slogan: '人狠话不多，干饭又干酒',
                desc: '酒局上你永远是最安静的那个，不说话不劝酒，默默吃菜默默喝酒。散场的时候第一个起身走人，深藏功与名，是酒局上最低调的存在。' },
            sheniu: { name: '酒后社牛型', emoji: '🎉', slogan: '平时社恐，喝完全场都是朋友',
                desc: '没喝酒的时候你内向腼腆，两杯下肚直接解锁社交牛逼症。跟邻桌称兄道弟、跟服务员聊人生，麦霸附体全场你最嗨，酒醒之后想找个地缝钻进去。' },
            emo: { name: 'emo哭包型', emoji: '😢', slogan: '啤酒配眼泪，越喝越心碎',
                desc: '你是典型的情绪型选手，一喝酒就开始回忆杀。前任、理想、逝去的青春，越想越难过，抱着朋友边哭边说，第二天醒了完全不敢回想昨晚说了啥。' },
            gaobai: { name: '告白狂魔型', emoji: '💘', slogan: '酒后壮胆，逮谁表白谁',
                desc: '酒精是你的勇气buff，喝多了就开始疯狂告白。喜欢的人、暗恋的人、甚至好朋友，全都能收到你的酒后深情发言，醒了挨个撤回道歉是你的固定操作。' },
            jiezou: { name: '节奏大师型', emoji: '🎯', slogan: '酒局导演，全场节奏我说了算',
                desc: '你是天生的酒局组织者，谁先喝、玩什么游戏、什么时候转场全由你掌控。心思缜密，酒量在线，酒局有你就不会冷场，朋友们组局第一个想到的就是你。' },
            taodan: { name: '逃单隐身型', emoji: '🏃', slogan: '一到结账就消失，厕所打电话全是戏',
                desc: '你是酒局的神秘嘉宾，喝的时候都在，买单的时候永远找不到人。上厕所、接电话、出去透气，各种借口层出不穷，主打一个白嫖，朋友又爱又恨。' },
            pengyouquan: { name: '朋友圈先喝型', emoji: '📸', slogan: '菜没动筷先拍照，朋友圈比我先喝',
                desc: '酒局对你来说一半是社交，一半是素材。菜上齐了先拍十分钟，修图调色发朋友圈，点赞收齐了才开始动筷子，仪式感比酒本身更重要。' },
            duanpian: { name: '断片失忆型', emoji: '💫', slogan: '喝着喝着人没了，醒了啥也记不住',
                desc: '你的酒后记忆是薛定谔的记忆，喝的时候啥事没有，第二天醒来完全断片。"我昨天怎么回家的？"是你的每周经典提问，朋友讲起你的酒后事迹你全程震惊。' }
        };

        const questions = [
            // 1. 赴约态度
            { q: '朋友周三晚上喊你周末喝酒，你的第一反应？', options: [
                { text: '立刻答应，正好想喝了', scores: { laizhebuqu: 1, sheniu: 1 } },
                { text: '先问问都有谁、在哪', scores: { jiezou: 1, yangyu: 1 } },
                { text: '不太想去，找理由推掉', scores: { chenmo: 1, yibeidao: 1 } },
                { text: '看心情，到时候再说', scores: { duanpian: 1, taodan: 1 } }
            ]},
            // 2. 到场时间
            { q: '约好八点的酒局，你一般几点到？', options: [
                { text: '提前十分钟到，等着大家', scores: { jiezou: 1, qianbei: 1 } },
                { text: '准点到，不早不晚', scores: { chenmo: 1, yangyu: 1 } },
                { text: '迟到半小时起步', scores: { taodan: 1, duanpian: 1 } },
                { text: '最后一个到，压轴出场', scores: { sheniu: 1, pengyouquan: 1 } }
            ]},
            // 3. 入座位置
            { q: '酒局入座，你会选什么位置？', options: [
                { text: '靠近门口/角落，低调坐着', scores: { chenmo: 1, yangyu: 1 } },
                { text: '中间C位，方便带动气氛', scores: { sheniu: 1, jiezou: 1 } },
                { text: '挨着好朋友坐，有安全感', scores: { yibeidao: 1, emo: 1 } },
                { text: '随便坐，哪有空坐哪', scores: { laizhebuqu: 1, duanpian: 1 } }
            ]},
            // 4. 点酒偏好
            { q: '第一次点酒，你一般怎么选？', options: [
                { text: '直接来啤酒/白的，喝着痛快', scores: { laizhebuqu: 1, qianbei: 1 } },
                { text: '来点度数低的，慢慢喝', scores: { yangyu: 1, yibeidao: 1 } },
                { text: '看大家喝什么我就喝什么', scores: { chenmo: 1, emo: 1 } },
                { text: '先拍个酒的照片再说', scores: { pengyouquan: 1 } }
            ]},
            // 5. 开场状态
            { q: '酒局刚开始的半小时，你在干嘛？', options: [
                { text: '默默吃菜，等别人先开口', scores: { chenmo: 1, yangyu: 1 } },
                { text: '主动找话题，暖场热气氛', scores: { sheniu: 1, jiezou: 1 } },
                { text: '玩手机刷消息，偶尔搭两句', scores: { duanpian: 1, taodan: 1 } },
                { text: '拍照拍视频，准备发圈', scores: { pengyouquan: 1 } }
            ]},
            // 6. 劝酒反应
            { q: '有人过来劝酒，说不喝不给面子，你会？', options: [
                { text: '直接干了，不就是一杯酒', scores: { laizhebuqu: 1, qianbei: 1 } },
                { text: '笑着打太极，抿一口混过去', scores: { yangyu: 1, jiezou: 1 } },
                { text: '直说喝不了，坚决不喝', scores: { yibeidao: 1, chenmo: 1 } },
                { text: '反过来把对方劝倒', scores: { sheniu: 1, jiezou: 1 } }
            ]},
            // 7. 敬酒习惯
            { q: '酒局上你会主动敬酒吗？', options: [
                { text: '会，挨个敬一圈是基本操作', scores: { jiezou: 1, sheniu: 1 } },
                { text: '只跟熟悉的人碰一下', scores: { chenmo: 1, emo: 1 } },
                { text: '别人敬我我才回敬', scores: { yangyu: 1, yibeidao: 1 } },
                { text: '基本不敬，喝自己的', scores: { taodan: 1, duanpian: 1 } }
            ]},
            // 8. 微醺状态
            { q: '喝到微醺有点上头的时候，你通常会？', options: [
                { text: '话突然变多，跟谁都能聊', scores: { sheniu: 1, gaobai: 1 } },
                { text: '安静坐着，开始想事情', scores: { chenmo: 1, emo: 1 } },
                { text: '跑厕所/出去透气躲酒', scores: { yangyu: 1, taodan: 1 } },
                { text: '掏出手机各种拍照', scores: { pengyouquan: 1 } }
            ]},
            // 9. 酒量自评
            { q: '你觉得自己的酒量怎么样？', options: [
                { text: '很强，基本没醉过', scores: { qianbei: 1, laizhebuqu: 1 } },
                { text: '一般，喝开心就好', scores: { jiezou: 1, sheniu: 1 } },
                { text: '很差，一杯就上脸', scores: { yibeidao: 1, emo: 1 } },
                { text: '飘忽不定，时好时坏', scores: { duanpian: 1, yangyu: 1 } }
            ]},
            // 10. 喝多表现
            { q: '真的喝多了之后，你更容易？', options: [
                { text: '越喝越嗨，停不下来', scores: { sheniu: 1, laizhebuqu: 1 } },
                { text: '开始emo，越想越难过', scores: { emo: 1, gaobai: 1 } },
                { text: '找地方坐着发呆/睡觉', scores: { chenmo: 1, yibeidao: 1 } },
                { text: '到处找人说话表白', scores: { gaobai: 1, sheniu: 1 } }
            ]},
            // 11. 游戏参与
            { q: '酒局玩游戏（骰子/划拳），你一般是？', options: [
                { text: '组织者，带大家一起玩', scores: { jiezou: 1, sheniu: 1 } },
                { text: '跟着玩，输了就喝', scores: { laizhebuqu: 1, qianbei: 1 } },
                { text: '在旁边看着，不参与', scores: { chenmo: 1, yangyu: 1 } },
                { text: '偷偷作弊，能少喝就少喝', scores: { taodan: 1, yangyu: 1 } }
            ]},
            // 12. 下酒菜
            { q: '喝酒的时候，下酒菜对你来说？', options: [
                { text: '不重要，光喝也行', scores: { laizhebuqu: 1, duanpian: 1 } },
                { text: '很重要，必须有吃的', scores: { chenmo: 1, qianbei: 1 } },
                { text: '先拍菜再吃，仪式感要有', scores: { pengyouquan: 1 } },
                { text: '随便吃两口，主要是聊天', scores: { sheniu: 1, emo: 1 } }
            ]},
            // 13. 中途离场
            { q: '酒局还没结束，你想走了会怎么做？', options: [
                { text: '跟大家打个招呼再走', scores: { jiezou: 1, qianbei: 1 } },
                { text: '悄悄溜走，不打招呼', scores: { taodan: 1, duanpian: 1 } },
                { text: '硬撑到散场再走', scores: { yangyu: 1, chenmo: 1 } },
                { text: '找借口说有事提前撤', scores: { yibeidao: 1, emo: 1 } }
            ]},
            // 14. 结账反应
            { q: '酒局结束要结账了，你一般是？', options: [
                { text: '主动抢着买单', scores: { qianbei: 1, jiezou: 1 } },
                { text: 'AA制，算清楚转给大家', scores: { chenmo: 1, yangyu: 1 } },
                { text: '假装上厕所/打电话', scores: { taodan: 1 } },
                { text: '等别人结完了再问多少钱', scores: { duanpian: 1, yibeidao: 1 } }
            ]},
            // 15. 散场安排
            { q: '散场之后，你通常会？', options: [
                { text: '安排好所有人再走', scores: { jiezou: 1, qianbei: 1 } },
                { text: '直接回家睡觉', scores: { chenmo: 1, yibeidao: 1 } },
                { text: '转场第二场接着喝', scores: { laizhebuqu: 1, sheniu: 1 } },
                { text: '路上就开始发朋友圈', scores: { pengyouquan: 1, emo: 1 } }
            ]},
            // 16. 第二天早上
            { q: '第二天早上醒来，第一件事？', options: [
                { text: '正常起床，啥事没有', scores: { qianbei: 1 } },
                { text: '头疼难受，发誓再也不喝', scores: { yibeidao: 1, duanpian: 1 } },
                { text: '翻聊天记录检查昨晚说了啥', scores: { gaobai: 1, emo: 1 } },
                { text: '翻朋友圈看昨晚发了啥', scores: { pengyouquan: 1, sheniu: 1 } }
            ]},
            // 17. 断片经历
            { q: '你喝酒断片的频率？', options: [
                { text: '从来没有，喝再多都记得', scores: { qianbei: 1, jiezou: 1 } },
                { text: '偶尔，喝特别多才会', scores: { laizhebuqu: 1, sheniu: 1 } },
                { text: '经常，喝着喝着就断了', scores: { duanpian: 1, yibeidao: 1 } },
                { text: '每次都断，习惯了', scores: { duanpian: 1, emo: 1 } }
            ]},
            // 18. 酒后后悔
            { q: '酒醒之后你最后悔的事通常是？', options: [
                { text: '不该说那么多话/乱表白', scores: { gaobai: 1, sheniu: 1 } },
                { text: '不该喝那么多，太难受了', scores: { yibeidao: 1, duanpian: 1 } },
                { text: '没什么好后悔的，喝都喝了', scores: { qianbei: 1, laizhebuqu: 1 } },
                { text: '后悔发了不该发的朋友圈', scores: { pengyouquan: 1, emo: 1 } }
            ]},
            // 19. 酒局频率
            { q: '你平均多久喝一次酒？', options: [
                { text: '每周至少一两次', scores: { qianbei: 1, sheniu: 1 } },
                { text: '朋友约了才喝，不主动', scores: { chenmo: 1, jiezou: 1 } },
                { text: '很少喝，偶尔聚会才喝', scores: { yibeidao: 1, yangyu: 1 } },
                { text: '想喝就喝，没个准', scores: { duanpian: 1, laizhebuqu: 1 } }
            ]},
            // 20. 自我认知
            { q: '你觉得自己在酒局里扮演什么角色？', options: [
                { text: '气氛组，负责热场嗨起来', scores: { sheniu: 1, jiezou: 1 } },
                { text: '背景板，安静喝酒不说话', scores: { chenmo: 1, yangyu: 1 } },
                { text: '兜底人，负责照顾大家收尾', scores: { qianbei: 1, jiezou: 1 } },
                { text: '凑数的，来蹭饭蹭酒', scores: { taodan: 1, duanpian: 1 } }
            ]}
        ];

        let currentQuestion = 0;
        let scores = {};
        let answerHistory = [];

        function initScores() {
            scores = {};
            Object.keys(personalities).forEach(key => {
                scores[key] = 0;
            });
        }

        function startQuiz() {
            initScores();
            currentQuestion = 0;
            answerHistory = [];
            document.getElementById('startPage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNumText').textContent = `第 ${currentQuestion + 1} / ${questions.length} 题`;
            document.getElementById('progressFill').style.width = `${((currentQuestion) / questions.length) * 100}%`;
            document.getElementById('questionText').textContent = q.q;
            
            const backBtn = document.getElementById('backBtn');
            if (currentQuestion === 0) {
                backBtn.classList.add('disabled');
            } else {
                backBtn.classList.remove('disabled');
            }
            
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (answerHistory[currentQuestion] === idx) {
                    div.classList.add('selected');
                }
                div.textContent = opt.text;
                div.onclick = () => selectOption(idx);
                optionsEl.appendChild(div);
            });
        }

        function selectOption(optionIndex) {
            if (answerHistory[currentQuestion] !== undefined) {
                const oldOpt = questions[currentQuestion].options[answerHistory[currentQuestion]];
                Object.entries(oldOpt.scores).forEach(([key, value]) => {
                    scores[key] -= value;
                });
            }

            const option = questions[currentQuestion].options[optionIndex];
            Object.entries(option.scores).forEach(([key, value]) => {
                scores[key] += value;
            });

            answerHistory[currentQuestion] = optionIndex;
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function goBack() {
            if (currentQuestion === 0) return;
            currentQuestion--;
            showQuestion();
        }

        function showResult() {
            let maxKey = 'qianbei';
            let maxScore = -1;
            Object.entries(scores).forEach(([key, value]) => {
                if (value > maxScore) {
                    maxScore = value;
                    maxKey = key;
                }
            });

            const result = personalities[maxKey];
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultType').textContent = result.name;
            document.getElementById('resultSlogan').textContent = result.slogan;
            document.getElementById('resultDesc').textContent = result.desc;
        }

        function restartQuiz() {
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('startPage').style.display = 'block';
        }
    </script>
</body>
